name: Monthly Branch Improvement Sync

on:
  schedule:
    # Runs at 00:00 on the 1st of every month to catch the previous month's branch
    - cron: '0 0 1 * *'
  workflow_dispatch: # Allows manual testing

jobs:
  find-and-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Calculate Target Branch Name
        id: vars
        run: |
          # Using 'last month' logic ensures we check the month that just ended
          YEAR=$(date -d "last month" +%Y)
          MONTH_NUM=$(date -d "last month" +%m)
          MONTH_NAME=$(date -d "last month" +%B | tr '[:upper:]' '[:lower:]')
          # previous month pattern e.g. 2026-01-january
          echo "branch_pattern=${YEAR}-${MONTH_NUM}-${MONTH_NAME}-improvements" >> $GITHUB_OUTPUT
          
      - name: Process GitHub Repositories
        env:
          GH_TOKEN: ${{ secrets.ORG_LEVEL_TOKEN }}
          BRANCH_NAME: ${{ steps.vars.outputs.branch_pattern }}
          ORG_NAME: "aleon1220"
        run: |
          echo "Searching for branch: $BRANCH_NAME"
          BRANCH_EVALUATION=$(gh api "repos/$ORG_NAME/kiwiki/branches/$BRANCH_NAME" --verbose || echo "404" )
          echo "=================***"
          echo "debug output from API $BRANCH_EVALUATION "
          echo "=================***"
          # 1. Get list of all non-archived repos in the org/account
          REPOS=$(gh repo list $ORG_NAME --limit 1000 --json name --jq '.[].name')
          echo "repos extracted"
          echo "================="
          for REPO in $REPOS; do
            echo "Checking github repo $ORG_NAME/$REPO..."
            
            echo "================="
            # 2. Check if improvement branch exists based on naming pattern
            # https://cli.github.com/manual/gh_api
            
            BRANCH_EXISTS=$(gh api repos/$ORG_NAME/$REPO/branches/$BRANCH_NAME --include "%{http_code}" || echo "404")

            if [ "$BRANCH_EXISTS" -eq "200" ]; then
              echo "gh Branch found! Checking for existing PRs..."
              
              # Check if a PR already exists to avoid duplicates
              PR_EXISTS=$(gh pr list -R $ORG_NAME/$REPO -H $BRANCH_NAME --json number --jq '.[0].number')

              if [ -z "$PR_EXISTS" ]; then
                echo "Creating Monthly Pull Request for $REPO..."
                gh pr create \
                  -R $ORG_NAME/$REPO \
                  -B main \
                  -H $BRANCH_NAME \
                  -t "Monthly Improvements: $BRANCH_NAME" \
                  -b "Automated PR to merge monthly improvements from $BRANCH_NAME into main."
              else
                echo "PR already exists (#$PR_EXISTS). Skipping."
              fi
            else
              echo "error in execution"
              echo "Branch not found in $REPO."
            fi
          done
          
      - name: notify Approvers
        run: |
          echo "stub todo:add reviewers"




