name: Java Utilities CI/CD

on:
  push:
    branches: ["main"]
    paths:
      - "java-utilities/**"
      - ".github/workflows/ci-cd-java-utilities.yml"
      - ".github/actions/java-build-test/**"
    tags:
      - "v*.*.*" # semVer tags trigger release job v1.0.0
  pull_request:
    branches: ["main"]
    paths:
      - "java-utilities/**"
  workflow_dispatch:

permissions:
  contents: write # Needed for creating GitHub Releases

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      app-utils-version: ${{ steps.build.outputs.app-utils-version }}
      app-utils-fat-jar: ${{ steps.build.outputs.app-utils-fat-jar }}
    steps:
      - name: Checkout github Repository
        uses: actions/checkout@v6.0.2
        # https://github.com/marketplace/actions/checkout
        with:
          # CRITICAL: Axion needs the full git history to calculate versions
          fetch-depth: 0

      - name: Test suite and Build Java Utilities
        id: build
        uses: ./.github/actions/java-build-test
        with:
          java-version: "25"
          working-directory: .

      - name: Upload Fat JAR Artifact
        uses: actions/upload-artifact@v7.0.1
        # https://github.com/marketplace/actions/upload-a-build-artifact
        with:
          name: java-utilities-fat-jar
          path: java-utilities/lib/build/libs/${{ steps.build.outputs.app-utils-fat-jar }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial for creating a GitHub Release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Release signing note
        run: |
          echo "====================================================================================="
          echo "🔐 Release signing is assumed to be handled by the annotated tag or external process."
          echo "If you need GPG-signed tags, create and push the signed tag locally before workflow execution."
          echo "====================================================================================="

      - name: Verify Version Calculation
        run: |
          TAG_NAME=${GITHUB_REF#refs/tags/}
          EXPECTED_TAG="v${{ needs.build.outputs.app-utils-version }}"
          echo "Tag name: $TAG_NAME"
          echo "Expected tag: $EXPECTED_TAG"
          if [ "$TAG_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag mismatch: release tag does not match calculated version" >&2
            exit 1
          fi

      - name: Download Fat JAR Artifact
        uses: actions/download-artifact@v8.0.1
        # https://github.com/marketplace/actions/download-a-build-artifact
        with:
          name: java-utilities-fat-jar
          path: ./artifact

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v3.0.0
        # https://github.com/marketplace/actions/gh-release
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}
          files: artifact/${{ needs.build.outputs.app-utils-fat-jar }}
