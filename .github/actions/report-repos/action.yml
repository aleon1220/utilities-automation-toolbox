name: "Report Repos"
description: "Reports across repositories in an organization"
inputs:
  repo_filter:
    description: "Optional substring to filter repositories (case-insensitive)"
    required: false
    default: ""
  branch_pattern:
    description: "Regex for improvement branches (grep -E)"
    required: false
    default: "-improvements$"
  org_name:
    description: "Organization name"
    required: true
  gh_token:
    description: "GitHub token"
    required: true
  debug:
    description: "Enable extra diagnostics (verbose gh api call)"
    required: false
    default: "false"

outputs:
  repo_count:
    description: "Total number of repositories processed"
    value: ${{ steps.enumerate.outputs.count }}
  repos_with_improvements:
    description: "Number of repositories with improvement branches"
    value: ${{ steps.process.outputs.improvements_count || '0' }}
  status:
    description: "Processing status (success/failure/no_repos)"
    value: ${{ steps.process.outputs.status || steps.enumerate.outputs.status }}

runs:
  using: "composite"
  steps:
    - name: Validate required inputs
      shell: bash
      run: |
        set -Eeuo pipefail
        if [ -z "${{ inputs.org_name }}" ]; then
          echo "ERROR: org_name input is required" >&2
          exit 1
        fi
        if [ -z "${{ inputs.gh_token }}" ]; then
          echo "ERROR: gh_token input is required" >&2
          exit 1
        fi

    - name: Check GitHub CLI and auth
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      shell: bash
      run: |
        set -Eeuo pipefail
        if ! gh --version >/dev/null 2>&1; then
          echo "ERROR: GitHub CLI 'gh' is not available in PATH" >&2
          exit 1
        fi
        if ! gh auth status -t >/dev/null 2>&1; then
          echo "ERROR: 'gh' authentication not initialized or token invalid" >&2
          echo "Ensure 'gh_token' is a valid token with required scopes." >&2
          exit 1
        fi

        echo "finished step GitHub CLI & auth"

    - name: Bootstrap bash environment (BASH_ENV)
      shell: bash
      run: |
        set -Eeuo pipefail
        ENV_FILE="$RUNNER_TEMP/bash_env"

        cat >"$ENV_FILE" <<'EOF'
        set -Eeuo pipefail
        IFS=$'\n\t'
        # Avoid interactive pagers
        export GIT_PAGER=
        # Reusable logger
        if [ -f "${GITHUB_WORKSPACE}/.github/scripts/logging.sh" ]; then
          # shellcheck source=/dev/null
          source "${GITHUB_WORKSPACE}/.github/scripts/logging.sh"
        else
          log() {
            local level="${1:-INFO}"; shift
            printf "[%s] %s\n" "$level" "$*"
          }
        fi
        EOF
        echo "BASH_ENV=$ENV_FILE" >> "$GITHUB_ENV"
        echo "Created a shared bash init file sourced automatically by all subsequent bash steps"

    - name: List repositories
      id: list
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        ORG_NAME: ${{ inputs.org_name }}
      shell: bash
      run: |
        # log is available via BASH_ENV
        log INFO "Listing non-archived repositories for ${ORG_NAME}"
        REPOS=$(gh repo list "$ORG_NAME" --limit 1000 --no-archived --json name --jq '.[].name')
        # Write raw list (may include empty if org has zero)
        printf "%s\n" "$REPOS" > "$RUNNER_TEMP/repos_all.txt"
        ALL_COUNT=$(sed '/^\s*$/d' "$RUNNER_TEMP/repos_all.txt" | wc -l | tr -d ' ')
        log INFO "Total repositories returned: ${ALL_COUNT}"
        echo "all_count=${ALL_COUNT}" >> "$GITHUB_OUTPUT"

    - name: Enumerate selection (apply filter and set outputs)
      id: enumerate
      env:
        ORG_NAME: ${{ inputs.org_name }}
        REPO_FILTER: ${{ inputs.repo_filter }}
      shell: bash
      run: |
        set -Eeuo pipefail
        : > "$RUNNER_TEMP/repos.txt"
        if [ -s "$RUNNER_TEMP/repos_all.txt" ]; then
          if [ -n "${REPO_FILTER:-}" ]; then
            log INFO "Applying repo filter: ${REPO_FILTER}"
            # Write grep results to repos.txt regardless of match results; avoid option parsing with leading '-'
            if ! grep -i -- "${REPO_FILTER}" "$RUNNER_TEMP/repos_all.txt" > "$RUNNER_TEMP/repos.txt"; then
              true # allow no matches without failing the step
            fi
          else
            cp "$RUNNER_TEMP/repos_all.txt" "$RUNNER_TEMP/repos.txt"
          fi
        fi
        COUNT=$(sed '/^\s*$/d' "$RUNNER_TEMP/repos.txt" | wc -l | tr -d ' ')
        log INFO "Selected repository count: ${COUNT}"
        echo "count=${COUNT}" >> "$GITHUB_OUTPUT"

        if [ "$COUNT" -eq 0 ]; then
          log WARN "No repositories matched the selection."
          echo "status=no_repos" >> "$GITHUB_OUTPUT"
        else
          echo "status=has_repos" >> "$GITHUB_OUTPUT"
        fi
        log INFO "finished step Enumerate selection"

    - name: Initialize metrics when no repos
      id: init_metrics
      if: steps.enumerate.outputs.status == 'no_repos'
      shell: bash
      run: |
        echo "improvements_count=0" >> "$GITHUB_OUTPUT"
        echo "status=no_repos" >> "$GITHUB_OUTPUT"
        log INFO "Initialized metrics for empty selection (no_repos)"

    - name: Process and analyze repositories
      id: process
      if: steps.enumerate.outputs.status == 'has_repos'
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        ORG_NAME: ${{ inputs.org_name }}
        BRANCH_PATTERN: ${{ inputs.branch_pattern }}
      shell: bash
      run: |
        set -Eeuo pipefail
        REPOS_PROCESSED=0
        REPOS_WITH_IMPROVEMENTS=0

        log INFO "Starting processing of repositories"

        while read -r REPO; do
          [ -z "$REPO" ] && continue
          ((REPOS_PROCESSED++))
          echo "::group::Report for ${ORG_NAME}/${REPO}"

          DEFAULT_BRANCH=$(gh api "repos/${ORG_NAME}/${REPO}" --jq '.default_branch' 2>/dev/null || echo "")
          if [ -z "$DEFAULT_BRANCH" ]; then
            log ERROR "Failed to fetch default branch or access repository ${REPO}. Skipping."
            echo "::endgroup::"
            continue
          fi

          VISIBILITY=$(gh api "repos/${ORG_NAME}/${REPO}" --jq '.visibility' 2>/dev/null || echo "")

          if [ "$DEFAULT_BRANCH" != "main" ]; then
            log WARN "for ${REPO} git Default branch is ${DEFAULT_BRANCH} TODO: review base branch convention"
          fi

          # Fetch branches and filter by pattern
          ALL_BRANCHES=$(gh api "repos/${ORG_NAME}/${REPO}/branches?per_page=100" --paginate --jq '.[].name' 2>/dev/null || echo "")
          if [ -n "${BRANCH_PATTERN:-}" ]; then
            # Use -- to avoid option parsing when pattern starts with '-'
            IMPROVEMENT_BRANCHES=$(printf "%s\n" "$ALL_BRANCHES" | grep -E -- "${BRANCH_PATTERN}" || true)
          else
            IMPROVEMENT_BRANCHES=""
          fi
          log INFO "Found all improvement-like branches (pattern='${BRANCH_PATTERN}')"

          if [ -z "$IMPROVEMENT_BRANCHES" ]; then
            log WARN "No branches matched pattern"
          else
            ((REPOS_WITH_IMPROVEMENTS++))
            log INFO "Sort branches descending (YYYY-MM prefix sorts well in dictionary order)"
            printf "%s\n" "$IMPROVEMENT_BRANCHES" | sort -r | while read -r BR; do
              [ -z "$BR" ] && continue
              AHEAD_BY=$(gh api "repos/${ORG_NAME}/${REPO}/compare/${DEFAULT_BRANCH}...${BR}" --jq '.ahead_by' 2>/dev/null || echo "")
              BEHIND_BY=$(gh api "repos/${ORG_NAME}/${REPO}/compare/${DEFAULT_BRANCH}...${BR}" --jq '.behind_by' 2>/dev/null || echo "")
              SUMMARY="repo=${REPO} base=${DEFAULT_BRANCH} vis=${VISIBILITY} branch=${BR} ahead_by=${AHEAD_BY:-0} behind_by=${BEHIND_BY:-0}"
              log INFO "$SUMMARY"
            done
          fi

          LAST_MERGED=$(gh pr list -R "${ORG_NAME}/${REPO}" --state merged --base "$DEFAULT_BRANCH" --limit 1 --json mergedAt --jq '.[0].mergedAt' 2>/dev/null || echo "")
          log INFO "repo ${REPO} last_merged_into_base=${LAST_MERGED:-none}"
          echo "::endgroup::"
        done < "$RUNNER_TEMP/repos.txt"

        echo "improvements_count=${REPOS_WITH_IMPROVEMENTS}" >> "$GITHUB_OUTPUT"
        echo "status=success" >> "$GITHUB_OUTPUT"
        log INFO "Processing complete: ${REPOS_PROCESSED} repos processed, ${REPOS_WITH_IMPROVEMENTS} with improvements"
        log INFO "finished processing git repositories"


    - name: Summary (has repos)
      if: steps.enumerate.outputs.status == 'has_repos'
      shell: bash
      run: |
        COUNT="${{ steps.enumerate.outputs.count }}"
        IMP="${{ steps.process.outputs.improvements_count }}"
        {
          echo "### Report Repos Summary"
          echo ""
          echo "- Org: ${{ inputs.org_name }}"
          echo "- Selected repos: ${COUNT}"
          echo "- Repos with improvement branches: ${IMP}"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Summary (no repos)
      if: steps.enumerate.outputs.status == 'no_repos'
      shell: bash
      run: |
        {
          echo "### Report Repos Summary"
          echo ""
          echo "- Org: ${{ inputs.org_name }}"
          echo "- No repositories matched the selection."
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Diagnostics (optional, read-only)
      if: ${{ inputs.debug == 'true' }}
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      shell: bash
      run: |
        echo "================= GitHub REST API docs: https://docs.github.com/en/rest"
        gh api --verbose "repos/${GITHUB_REPOSITORY}/branches" || echo "Verbose output unavailable"
        echo "================= completed verbose API call for branch diagnostics"
