name: 'Java Build and Test'
description: 'Sets up Java 25, configures Gradle, builds the project and creates the Fat JAR.'
inputs:
  java-version:
    description: 'The Java JDK version to use'
    required: false
    default: '25'
  working-directory:
    description: 'The root directory of the Java project'
    required: false
    default: 'java-utilities'
runs:
  using: 'composite'
  steps:
    - name: Setup Java
      uses: actions/setup-java@v5
      # https://github.com/marketplace/actions/setup-java-jdk?version=v5.0.0
      with:
        distribution: 'microsoft'
        java-version: ${{ inputs.java-version }}

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v6
      # https://github.com/gradle/actions/blob/main/README.md

    - name: Build and Test with Gradle
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        gradle wrapper
        chmod +x gradlew
        echo "checking location $PWD"
        ls -lha 
        ./gradlew clean build shadowJar
