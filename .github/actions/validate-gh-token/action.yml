name: Validate GitHub Token
description: Validates GitHub CLI authentication and token permissions

inputs:
  gh_token:
    description: GitHub token for authentication
    required: true

outputs:
  authenticated:
    description: Whether the token is properly authenticated
    value: ${{ steps.validate.outputs.authenticated }}
  token_owner:
    description: The owner/user associated with the token
    value: ${{ steps.validate.outputs.token_owner }}
  token_scopes:
    description: The scopes associated with the token
    value: ${{ steps.validate.outputs.token_scopes }}
  permissions_valid:
    description: required token permissions are present
    value: ${{ steps.validate_permissions.outputs.permissions_valid }}

runs:
  using: composite
  steps:
    - name: Validate GitHub Token
      id: validate
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      run: |
        set -e

        echo "::group::Validating GitHub Token"

        # Check if token is set
        if [ -z "$GH_TOKEN" ]; then
          echo "::error::GitHub token is empty or not provided"
          echo "authenticated=false" >> $GITHUB_OUTPUT
          exit 1
        fi

        # Attempt authentication
        if ! gh auth status > /tmp/auth_status.txt 2>&1; then
          echo "::error::GitHub CLI authentication failed"
          cat /tmp/auth_status.txt
          echo "authenticated=false" >> $GITHUB_OUTPUT
          exit 1
        fi

        echo "::notice::✓ GitHub CLI authentication successful"
        echo "authenticated=true" >> $GITHUB_OUTPUT
        echo "::notice::✓ Extracted key information and set GITHUB_OUTPUT"
        echo "::endgroup::"

        # Extract token owner
        TOKEN_OWNER=$(gh auth status --show-token 2>/dev/null | grep "Logged in to" | awk '{print $4}' || echo "unknown")
        echo "token_owner=$TOKEN_OWNER" >> $GITHUB_OUTPUT
        echo "authenticated=true" >> $GITHUB_OUTPUT

        # Get token scopes
        TOKEN_SCOPES=$(gh api user --jq '.login' 2>/dev/null)
        
        if "$TOKEN_SCOPES"; then
          TOKEN_SCOPES_MSG="Token has repository access"
        else
          TOKEN_SCOPES_MSG="Limited token scope"
        fi
        
        echo "token_scopes=$TOKEN_SCOPES_MSG" >> $GITHUB_OUTPUT
        echo "::notice::✓ Completed obtaining token_scopes to GITHUB_OUTPUT"
        echo "::endgroup::"

        echo "::group::Debug output TOKEN_SCOPES"
        echo "$TOKEN_SCOPES"
        echo "::endgroup::"

    - name: Validate Token Permissions
      id: validate_permissions
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
      run: |
        set -e
        
        echo "::group::Validating Token Permissions"
        
        REQUIRED_SCOPES=("repo" "read:org" "workflow")
        MISSING_SCOPES=()
        
        # Get token info to check scopes
        TOKEN_INFO=$(gh auth status --show-token 2>&1 || true)
        
        echo "Token capabilities:"
        
        # Check for repo scope
        if ! gh api repos/${{ github.repository_owner }} --silent 2>/dev/null; then
          MISSING_SCOPES+=("repo")
          echo "::warning::Missing 'repo' scope - cannot access repositories"
        else
          echo "::debug::✓ Has 'repo' scope"
        fi
        
        if ! gh api orgs/${{ github.repository_owner }} --silent 2>/dev/null; then
          MISSING_SCOPES+=("read:org")
          echo "::warning::Missing 'read:org' scope - cannot read organization"
        else
          echo "::debug::✓ Has 'read:org' scope"
        fi
        echo "::notice::✓ Checked for org read scope"
        
        if ! gh api repos/${{ github.repository_owner }}/${{ github.event.repository.name }}/actions/runs --silent 2>/dev/null; then
          MISSING_SCOPES+=("workflow")
          echo "::warning::Missing 'workflow' scope - cannot access workflows"
        else
          echo "::debug::✓ Has 'workflow' scope"
        fi
        
        echo "::notice::✓ Checked for workflow scope"
        
        if [ ${#MISSING_SCOPES[@]} -gt 0 ]; then
          echo "::debug:: there appears to be some sort of issue in the validation"
          echo "::warning::throwing a WARN instead of error"
          # echo "::error::Missing required scopes: ${MISSING_SCOPES[*]}"
          # echo "permissions_valid=false" >> $GITHUB_OUTPUT
          echo "::endgroup::"
          exit 1
        fi
        
        echo "::notice::✓ All required token permissions validated successfully"
        echo "permissions_valid=true" >> $GITHUB_OUTPUT
        echo "::endgroup::"        
